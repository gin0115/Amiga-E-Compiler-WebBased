name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [16, 20, 22]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # zero dependencies — no npm install step at all

      - name: Unit tests (lexer, parser, sem, assembler, encodings)
        run: node test/run.js

      - name: End-to-end tests (CLI → AmigaOS executables / .m modules)
        run: node test/e2e/run-e2e.js

      - name: Install vamos (open-source m68k emulation, no ROM needed)
        run: |
          pipx install amitools
          BIN_DIR="$(pipx environment --value PIPX_BIN_DIR)"
          echo "pipx bin dir: $BIN_DIR"
          "$BIN_DIR/vamos" --help > /dev/null   # fail THIS step if not runnable
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          echo "VAMOS_BIN=$BIN_DIR/vamos" >> "$GITHUB_ENV"

      - name: Behavioral tests (run compiled Amiga binaries, golden stdout)
        env:
          REQUIRE_VAMOS: 1
        run: node test/e2e/run-behavior.js
